<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TravelSplit"/>
  <title>TravelSplit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0f1923;color:#e8dcc8;font-family:'Georgia','Times New Roman',serif}
    input,select,button,textarea{font-family:inherit}
    input::placeholder,textarea::placeholder{color:#3a4a5a}
    select option{background:#1a2a3a}
    ::-webkit-scrollbar{display:none}
    .grid-bg{position:fixed;inset:0;opacity:.04;pointer-events:none;
      background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,#c8a96e 39px,#c8a96e 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,#c8a96e 39px,#c8a96e 40px)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.2s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{display:inline-block;animation:spin 1s linear infinite}
  </style>
</head>
<body>
<div id="root"></div>
<div class="grid-bg"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

/* ── constants ── */
const CURRENCIES=[
  {code:"JPY",symbol:"¥",flag:"🇯🇵"},{code:"USD",symbol:"$",flag:"🇺🇸"},
  {code:"EUR",symbol:"€",flag:"🇪🇺"},{code:"GBP",symbol:"£",flag:"🇬🇧"},
  {code:"CNY",symbol:"¥",flag:"🇨🇳"},{code:"KRW",symbol:"₩",flag:"🇰🇷"},
  {code:"TWD",symbol:"NT$",flag:"🇹🇼"},{code:"HKD",symbol:"HK$",flag:"🇭🇰"},
  {code:"PHP",symbol:"₱",flag:"🇵🇭"},{code:"THB",symbol:"฿",flag:"🇹🇭"},
];
const TRIP_EMOJIS=["✈️","🗾","🏖️","🏔️","🌏","🚢","🎌","🏝️","🌴","🎡","🍜","🍣"];
const TABS=["👥 メンバー","💳 支払い","🧮 精算"];
const gid=()=>Math.random().toString(36).slice(2,9);

/* ── firebase singleton ── */
let _db=null;
function getDb(){return _db;}
function initFirebase(cfg){
  try{
    let app;
    if(firebase.apps.length>0){
      app=firebase.apps[0];
    }else{
      app=firebase.initializeApp(cfg);
    }
    _db=firebase.database(app);
    return true;
  }catch(e){console.error(e);return false;}
}

/* ── calc ── */
function calcSettlements(members,expenses,rates){
  const bal={};
  members.forEach(m=>(bal[m.id]=0));
  expenses.forEach(exp=>{
    const r=rates[exp.currency]?1/rates[exp.currency]:1;
    const jpy=exp.amount*r,pp=jpy/exp.recipients.length;
    bal[exp.payerId]=(bal[exp.payerId]||0)+jpy;
    exp.recipients.forEach(rid=>{bal[rid]=(bal[rid]||0)-pp});
  });
  const cr=[],db2=[];
  Object.entries(bal).forEach(([id,amt])=>{
    if(amt>0.5)cr.push({id,amt});else if(amt<-0.5)db2.push({id,amt:-amt});
  });
  cr.sort((a,b)=>b.amt-a.amt);db2.sort((a,b)=>b.amt-a.amt);
  const tx=[];let ci=0,di=0;
  while(ci<cr.length&&di<db2.length){
    const c=cr[ci],d=db2[di],pay=Math.min(c.amt,d.amt);
    tx.push({from:d.id,to:c.id,amount:Math.round(pay)});
    c.amt-=pay;d.amt-=pay;
    if(c.amt<0.5)ci++;if(d.amt<0.5)di++;
  }
  return{bal,tx};
}

/* ── shared styles ── */
const CS={background:"linear-gradient(135deg,#16222e,#111a24)",border:"1px solid #2a3a4a",borderRadius:10,padding:"14px 16px"};
const IS={width:"100%",background:"#0c1620",border:"1px solid #2a3a4a",borderRadius:8,color:"#e8dcc8",padding:"10px 12px",fontSize:16,outline:"none"};
const BP={background:"linear-gradient(135deg,#c8a96e,#a07840)",border:"none",borderRadius:8,color:"#0f1923",padding:"10px 18px",cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:1};
const BD={background:"none",border:"1px solid #5a3a3a",borderRadius:6,color:"#8a5a5a",padding:"4px 10px",cursor:"pointer",fontSize:12};
const CI={background:"#0c1620",border:"1px solid #2a3a4a",borderRadius:20,color:"#8a9bb0",padding:"8px 16px",cursor:"pointer",fontSize:14};
const CA=i=>({background:`hsl(${i*47%360},40%,20%)`,border:`1px solid hsl(${i*47%360},50%,40%)`,borderRadius:20,color:`hsl(${i*47%360},60%,75%)`,padding:"8px 16px",cursor:"pointer",fontSize:14,fontWeight:"bold"});

function ST({icon,title,small}){return(
  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:small?10:18}}>
    <span style={{fontSize:small?14:18}}>{icon}</span>
    <span style={{fontSize:small?13:16,fontWeight:"bold",color:"#c8a96e",letterSpacing:1,textTransform:"uppercase"}}>{title}</span>
    <div style={{flex:1,height:1,background:"linear-gradient(90deg,#c8a96e44,transparent)",marginLeft:4}}/>
  </div>
);}
function Lbl({children}){return <div style={{fontSize:11,color:"#8a9bb0",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>{children}</div>;}
function ES({text}){return <div style={{textAlign:"center",color:"#3a4a5a",padding:"40px 0",fontSize:14}}>— {text} —</div>;}

/* ══════════════════════════════════
   SETUP SCREEN
══════════════════════════════════ */
function SetupScreen({onDone}){
  const[step,setStep]=useState(0); // 0=guide 1=input
  const[cfg,setCfg]=useState({apiKey:"",databaseURL:"",projectId:""});
  const[err,setErr]=useState("");
  const[testing,setTesting]=useState(false);

  const handleTest=async()=>{
    if(!cfg.apiKey||!cfg.databaseURL||!cfg.projectId){setErr("すべての項目を入力してください");return;}
    if(!cfg.databaseURL.startsWith("https://")||!cfg.databaseURL.includes("firebaseio.com")){
      setErr("databaseURLは https://xxxxx.firebaseio.com の形式で入力してください");return;
    }
    setTesting(true);setErr("");
    const ok=initFirebase(cfg);
    if(!ok){setErr("設定が正しくありません。もう一度確認してください。");setTesting(false);return;}
    // Just save and proceed — actual connection verified on first data load
    localStorage.setItem("travelsplit_firebase",JSON.stringify(cfg));
    setTesting(false);
    onDone();
  };

  if(step===0) return(
    <div className="fade-in" style={{maxWidth:480,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:48,marginBottom:12}}>☁️</div>
        <div style={{fontSize:20,fontWeight:"bold",color:"#c8a96e",marginBottom:8}}>クラウド同期の設定</div>
        <div style={{fontSize:13,color:"#8a9bb0",lineHeight:1.7}}>
          旅仲間と同じデータをリアルタイムで共有するために、<br/>
          Firebaseというサービス（<strong style={{color:"#c8a96e"}}>無料</strong>）を使います。
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
        {[
          {n:"1",icon:"🌐",title:"Firebase にアクセス",desc:<>PCで <a href="https://console.firebase.google.com" target="_blank" style={{color:"#c8a96e"}}>console.firebase.google.com</a> を開く（Googleアカウント必要）</>},
          {n:"2",icon:"➕",title:"プロジェクトを作成",desc:"「プロジェクトを作成」→ 好きな名前を入力 → 作成"},
          {n:"3",icon:"⚙️",title:"Realtime Database を有効化",desc:"左メニュー「構築」→「Realtime Database」→「データベースを作成」→「テストモードで開始」"},
          {n:"4",icon:"🔑",title:"設定キーを取得",desc:"左メニュー「プロジェクトの概要 ⚙️」→「プロジェクトの設定」→「全般」タブ → 下にスクロールして「マイアプリ」→「</>」ボタン → アプリ登録 → firebaseConfig の中身をコピー"},
        ].map(s=>(
          <div key={s.n} style={{...CS,display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"#c8a96e22",border:"1px solid #c8a96e55",
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:"bold",color:"#c8a96e"}}>
              {s.n}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:"bold",color:"#e8dcc8",marginBottom:3}}>{s.icon} {s.title}</div>
              <div style={{fontSize:12,color:"#8a9bb0",lineHeight:1.6}}>{s.desc}</div>
            </div>
          </div>
        ))}
      </div>

      <button onClick={()=>setStep(1)} style={{...BP,width:"100%",padding:"16px 0",fontSize:15}}>
        設定を入力する →
      </button>
      <div style={{textAlign:"center",marginTop:12}}>
        <button onClick={onDone} style={{background:"none",border:"none",color:"#4a5a6a",fontSize:12,cursor:"pointer"}}>
          スキップ（端末内のみで使用）
        </button>
      </div>
    </div>
  );

  return(
    <div className="fade-in" style={{maxWidth:480,margin:"0 auto",padding:"24px 16px"}}>
      <ST icon="🔑" title="Firebase 設定を入力"/>
      <div style={{fontSize:12,color:"#8a9bb0",marginBottom:20,lineHeight:1.7}}>
        firebaseConfig から以下の値をコピーして貼り付けてください。
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {[
          {key:"apiKey",label:"apiKey",ph:"AIzaSy..."},
          {key:"databaseURL",label:"databaseURL",ph:"https://xxxxx-default-rtdb.firebaseio.com"},
          {key:"projectId",label:"projectId",ph:"your-project-id"},
        ].map(f=>(
          <div key={f.key} style={CS}>
            <Lbl>{f.label}</Lbl>
            <input value={cfg[f.key]} onChange={e=>setCfg(c=>({...c,[f.key]:e.target.value}))}
              placeholder={f.ph} style={IS}/>
          </div>
        ))}
        {err&&<div style={{color:"#e07070",fontSize:12,textAlign:"center",padding:"8px 0"}}>{err}</div>}
        <button onClick={handleTest} disabled={testing}
          style={{...BP,width:"100%",padding:"16px 0",fontSize:15,opacity:testing?0.6:1}}>
          {testing?<><span className="spin">⏳</span> 接続テスト中...</>:"接続してスタート ✓"}
        </button>
        <button onClick={()=>setStep(0)} style={{...BD,width:"100%",padding:"12px 0",fontSize:13}}>← 戻る</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   TRIP LIST
══════════════════════════════════ */
function TripList({trips,onSelect,onCreate,onDelete,syncing}){
  const[name,setName]=useState("");
  const[emoji,setEmoji]=useState("✈️");
  const[showForm,setShowForm]=useState(false);

  const handleCreate=()=>{
    if(!name.trim())return;
    onCreate({id:gid(),name:name.trim(),emoji,members:[],expenses:[],createdAt:Date.now()});
    setName("");setEmoji("✈️");setShowForm(false);
  };

  return(
    <div className="fade-in">
      <ST icon="🗺️" title="旅行プロジェクト"/>
      {syncing&&<div style={{fontSize:11,color:"#5a9a8a",textAlign:"center",marginBottom:12}}>
        <span className="spin">🔄</span> 同期中...
      </div>}

      {!showForm&&(
        <button onClick={()=>setShowForm(true)} style={{...BP,width:"100%",padding:"14px 0",fontSize:14,marginBottom:20}}>
          ＋ 新しい旅行を作成
        </button>
      )}

      {showForm&&(
        <div style={{...CS,marginBottom:20}}>
          <Lbl>旅行名</Lbl>
          <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleCreate()}
            placeholder="例: 台湾旅行、四国旅行..." style={{...IS,marginBottom:12}} autoFocus/>
          <Lbl>アイコン</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {TRIP_EMOJIS.map(em=>(
              <button key={em} onClick={()=>setEmoji(em)} style={{
                width:42,height:42,borderRadius:8,border:emoji===em?"2px solid #c8a96e":"1px solid #2a3a4a",
                background:emoji===em?"#1a2a1a":"#0c1620",fontSize:20,cursor:"pointer"}}>{em}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={handleCreate} style={{...BP,flex:1,padding:"12px 0"}}>作成</button>
            <button onClick={()=>setShowForm(false)} style={{...BD,flex:1,padding:"12px 0",fontSize:13}}>キャンセル</button>
          </div>
        </div>
      )}

      {trips.length===0&&!showForm&&<ES text="旅行プロジェクトを追加してください"/>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[...trips].sort((a,b)=>b.createdAt-a.createdAt).map(trip=>(
          <div key={trip.id} style={{position:"relative"}}>
            <div onClick={()=>onSelect(trip.id)}
              style={{...CS,cursor:"pointer",borderColor:trip._settled&&trip.expenses?.length>0?"#2a4a2a":"#2a3a4a"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:30,width:46,height:46,display:"flex",alignItems:"center",justifyContent:"center",
                  background:"#0c1620",borderRadius:10,border:"1px solid #2a3a4a",flexShrink:0}}>{trip.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:"bold",color:"#e8dcc8",marginBottom:2}}>{trip.name}</div>
                  <div style={{fontSize:12,color:"#8a9bb0"}}>
                    {(trip.members||[]).length}人 · {(trip.expenses||[]).length}件
                  </div>
                  {(trip.expenses||[]).length>0&&(
                    <div style={{fontSize:12,color:"#c8a96e",marginTop:2}}>合計 ¥{Math.round(trip._total||0).toLocaleString()}</div>
                  )}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                  {trip._settled&&(trip.expenses||[]).length>0&&(
                    <span style={{fontSize:10,color:"#5a9a5a",background:"#1a2a1a",border:"1px solid #3a6a3a",borderRadius:10,padding:"2px 8px"}}>精算済み</span>
                  )}
                  {!trip._settled&&(trip.expenses||[]).length>0&&(
                    <span style={{fontSize:10,color:"#9a6a3a",background:"#2a1a0a",border:"1px solid #6a4a2a",borderRadius:10,padding:"2px 8px"}}>未精算</span>
                  )}
                  <span style={{color:"#3a4a5a",fontSize:18}}>›</span>
                </div>
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();if(confirm(`「${trip.name}」を削除しますか？`))onDelete(trip.id);}}
              style={{position:"absolute",top:8,right:8,background:"none",border:"none",color:"#3a2a2a",fontSize:16,cursor:"pointer",padding:"4px",lineHeight:1}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   TRIP DETAIL
══════════════════════════════════ */
function TripDetail({trip,rates,rateTime,rateLoading,onBack,onUpdate,onRefreshRates,syncing}){
  const[tab,setTab]=useState(0);
  const[newMem,setNewMem]=useState("");
  const members=trip.members||[];
  const expenses=trip.expenses||[];
  const[form,setForm]=useState({
    payerId:members[0]?.id||"",
    recipients:members.map(m=>m.id),
    amount:"",currency:"JPY",description:""
  });

  const update=(patch)=>onUpdate({...trip,...patch,members:patch.members||members,expenses:patch.expenses||expenses});

  const addMember=()=>{
    if(!newMem.trim())return;
    const m={id:gid(),name:newMem.trim()};
    const nm=[...members,m];
    update({members:nm});
    setNewMem("");
    setForm(f=>({...f,payerId:f.payerId||m.id,recipients:[...f.recipients,m.id]}));
  };
  const remMember=id=>{
    const nm=members.filter(m=>m.id!==id);
    const ne=expenses.filter(e=>e.payerId!==id&&!e.recipients.includes(id));
    update({members:nm,expenses:ne});
    setForm(f=>({...f,payerId:f.payerId===id?(nm[0]?.id||""):f.payerId,recipients:f.recipients.filter(r=>r!==id)}));
  };
  const togRec=id=>setForm(f=>({...f,recipients:f.recipients.includes(id)?f.recipients.filter(r=>r!==id):[...f.recipients,id]}));
  const addExpense=()=>{
    if(!form.payerId||!form.amount||form.recipients.length===0)return;
    update({expenses:[...expenses,{id:gid(),...form,amount:parseFloat(form.amount)}]});
    setForm(f=>({...f,amount:"",description:""}));
    setTab(2);
  };
  const gname=id=>members.find(m=>m.id===id)?.name||"?";
  const gci=code=>CURRENCIES.find(c=>c.code===code)||CURRENCIES[0];
  const tojpy=(amt,cur)=>cur==="JPY"?amt:rates[cur]?amt/rates[cur]:amt;
  const{bal,tx}=calcSettlements(members,expenses,rates);
  const total=expenses.reduce((s,e)=>s+tojpy(e.amount,e.currency),0);

  return(
    <div style={{minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"linear-gradient(135deg,#1a2a3a,#0f1923)",borderBottom:"2px solid #c8a96e",
        position:"sticky",top:0,zIndex:100,paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <button onClick={onBack} style={{background:"none",border:"none",color:"#c8a96e",fontSize:24,cursor:"pointer",padding:"0 4px 0 0",lineHeight:1}}>‹</button>
            <span style={{fontSize:22}}>{trip.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:17,fontWeight:"bold",color:"#c8a96e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trip.name}</div>
              <div style={{fontSize:9,color:"#8a9bb0",letterSpacing:2,display:"flex",alignItems:"center",gap:4}}>
                TravelSplit
                {syncing&&<span style={{color:"#5a9a8a"}}><span className="spin">🔄</span> 同期中</span>}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {rateLoading?<div style={{fontSize:10,color:"#8a9bb0"}}>📡 取得中...</div>:
                <><div style={{fontSize:10,color:"#5a7a5a"}}>🟢 為替取得済み</div><div style={{fontSize:9,color:"#4a6a4a"}}>{rateTime}</div></>}
            </div>
          </div>
          <div style={{display:"flex",gap:2,marginTop:10}}>
            {TABS.map((t,i)=>(
              <button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"10px 0",border:"none",cursor:"pointer",fontSize:11,
                background:tab===i?"#c8a96e":"transparent",color:tab===i?"#0f1923":"#8a9bb0",
                fontWeight:tab===i?"bold":"normal",borderRadius:"6px 6px 0 0"}}>{t}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px"}}>

        {tab===0&&(
          <div className="fade-in">
            <ST icon="👥" title="メンバー"/>
            <div style={{marginBottom:16,display:"flex",gap:8}}>
              <input value={newMem} onChange={e=>setNewMem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()}
                placeholder="名前を入力..." style={IS}/>
              <button onClick={addMember} style={{...BP,whiteSpace:"nowrap"}}>追加</button>
            </div>
            {members.length===0&&<ES text="メンバーを追加してください"/>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {members.map((m,i)=>(
                <div key={m.id} style={CS}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                      background:`hsl(${i*47%360},40%,25%)`,border:`2px solid hsl(${i*47%360},50%,45%)`,
                      fontSize:15,fontWeight:"bold",color:`hsl(${i*47%360},60%,80%)`}}>{m.name[0]}</div>
                    <span style={{flex:1,fontSize:16}}>{m.name}</span>
                    {members.length>1&&<button onClick={()=>remMember(m.id)} style={BD}>削除</button>}
                  </div>
                </div>
              ))}
            </div>
            {members.length>=2&&(
              <button onClick={()=>setTab(1)} style={{...BP,width:"100%",marginTop:20,padding:"16px 0",fontSize:15}}>
                支払いを追加する →
              </button>
            )}
          </div>
        )}

        {tab===1&&(
          <div className="fade-in">
            <ST icon="💳" title="支払いを追加"/>
            {members.length<2&&<ES text="先にメンバーを2人以上追加してください"/>}
            {members.length>=2&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={CS}>
                  <Lbl>説明（任意）</Lbl>
                  <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}
                    placeholder="例: ランチ代、ホテル代..." style={IS}/>
                </div>
                <div style={CS}>
                  <Lbl>支払った人</Lbl>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
                    {members.map((m,i)=>(
                      <button key={m.id} onClick={()=>setForm(f=>({...f,payerId:m.id}))} style={form.payerId===m.id?CA(i):CI}>{m.name}</button>
                    ))}
                  </div>
                </div>
                <div style={CS}>
                  <Lbl>金額と通貨</Lbl>
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <input type="number" inputMode="decimal" value={form.amount}
                      onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
                      placeholder="0" style={{...IS,flex:2,fontSize:24,fontWeight:"bold",textAlign:"right"}}/>
                    <select value={form.currency} onChange={e=>setForm(f=>({...f,currency:e.target.value}))}
                      style={{...IS,flex:1.2,fontSize:13,padding:"10px 6px"}}>
                      {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.flag} {c.code}</option>)}
                    </select>
                  </div>
                  {form.amount&&form.currency!=="JPY"&&rates[form.currency]&&(
                    <div style={{marginTop:8,fontSize:13,color:"#c8a96e",textAlign:"right"}}>
                      ≈ ¥{Math.round(parseFloat(form.amount||0)/rates[form.currency]).toLocaleString()} 円
                    </div>
                  )}
                </div>
                <div style={CS}>
                  <Lbl>割り勘する人</Lbl>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
                    {members.map((m,i)=>(
                      <button key={m.id} onClick={()=>togRec(m.id)} style={form.recipients.includes(m.id)?CA(i):CI}>{m.name}</button>
                    ))}
                  </div>
                  <button onClick={()=>setForm(f=>({...f,recipients:members.map(m=>m.id)}))}
                    style={{marginTop:10,background:"none",border:"none",color:"#8a9bb0",fontSize:12,cursor:"pointer",padding:0}}>全員選択</button>
                </div>
                <button onClick={addExpense} disabled={!form.payerId||!form.amount||form.recipients.length===0}
                  style={{...BP,width:"100%",padding:"18px 0",fontSize:16,
                    opacity:(!form.payerId||!form.amount||form.recipients.length===0)?0.4:1}}>
                  支払いを追加 ✓
                </button>
              </div>
            )}
          </div>
        )}

        {tab===2&&(
          <div className="fade-in">
            <ST icon="🧮" title="精算結果"/>
            {expenses.length===0&&<ES text="支払いをまだ追加していません"/>}
            {expenses.length>0&&(
              <>
                <div style={{...CS,background:"linear-gradient(135deg,#1a2a1a,#152515)",borderColor:"#3a6a3a",marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:11,color:"#5a9a5a",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>総支出</div>
                      <div style={{fontSize:28,fontWeight:"bold",color:"#7ac87a"}}>¥{Math.round(total).toLocaleString()}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:"#5a9a5a",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>1人あたり</div>
                      <div style={{fontSize:22,color:"#7ac87a"}}>¥{members.length>0?Math.round(total/members.length).toLocaleString():0}</div>
                    </div>
                  </div>
                </div>

                <ST icon="⚖️" title="各自の収支" small/>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
                  {members.map((m,i)=>{
                    const b=Math.round(bal[m.id]||0);
                    return(
                      <div key={m.id} style={CS}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                            background:`hsl(${i*47%360},40%,25%)`,fontSize:12,fontWeight:"bold",color:`hsl(${i*47%360},60%,80%)`}}>{m.name[0]}</div>
                          <span style={{flex:1}}>{m.name}</span>
                          <span style={{fontSize:16,fontWeight:"bold",color:b>0?"#7ac87a":b<0?"#e07070":"#8a9bb0"}}>
                            {b>0?"+":""}{b.toLocaleString()}円
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <ST icon="💸" title="支払い指示" small/>
                {tx.length===0
                  ?<div style={{...CS,textAlign:"center",color:"#7ac87a",fontSize:14,padding:20}}>🎉 全員精算済みです！</div>
                  :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {tx.map((t,i)=>(
                      <div key={i} style={{...CS,background:"linear-gradient(135deg,#1a1a2a,#12121e)",borderColor:"#3a3a6a"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",lineHeight:2}}>
                          <span style={{fontWeight:"bold",color:"#e07070"}}>{gname(t.from)}</span>
                          <span style={{color:"#5a6a8a",fontSize:13}}>が</span>
                          <span style={{fontWeight:"bold",color:"#7ac87a"}}>{gname(t.to)}</span>
                          <span style={{color:"#5a6a8a",fontSize:13}}>に</span>
                          <span style={{fontWeight:"bold",fontSize:18,color:"#c8a96e"}}>¥{t.amount.toLocaleString()}</span>
                          <span style={{color:"#5a6a8a",fontSize:13}}>払う</span>
                        </div>
                      </div>
                    ))}
                  </div>
                }

                <div style={{marginTop:28}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <ST icon="📋" title="支払い履歴" small/>
                    <button onClick={()=>setTab(1)} style={{...BP,padding:"6px 14px",fontSize:12}}>+ 追加</button>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {expenses.map(e=>{
                      const ci=gci(e.currency);
                      return(
                        <div key={e.id} style={{...CS,padding:"10px 14px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{flex:1,marginRight:8}}>
                              <div style={{fontSize:13,fontWeight:"bold",color:"#e8dcc8"}}>{e.description||"支払い"}</div>
                              <div style={{fontSize:11,color:"#8a9bb0",marginTop:2}}>{gname(e.payerId)} → {e.recipients.map(gname).join(", ")}</div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{fontSize:14,fontWeight:"bold",color:"#c8a96e"}}>{ci.flag} {ci.symbol}{e.amount.toLocaleString()}</div>
                              {e.currency!=="JPY"&&<div style={{fontSize:10,color:"#5a6a8a"}}>¥{Math.round(tojpy(e.amount,e.currency)).toLocaleString()}</div>}
                            </div>
                          </div>
                          <button onClick={()=>update({expenses:expenses.filter(x=>x.id!==e.id)})}
                            style={{marginTop:6,background:"none",border:"none",color:"#5a4a4a",fontSize:11,cursor:"pointer",padding:0}}>削除</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{marginTop:16,textAlign:"center"}}>
                  <button onClick={onRefreshRates} style={{background:"none",border:"1px solid #3a4a5a",borderRadius:6,color:"#8a9bb0",fontSize:11,padding:"8px 16px",cursor:"pointer"}}>
                    🔄 為替レートを更新
                  </button>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState("loading"); // loading | setup | list | detail
  const[trips,setTrips]=useState([]);
  const[selectedId,setSelectedId]=useState(null);
  const[rates,setRates]=useState({});
  const[rateTime,setRateTime]=useState(null);
  const[rateLoading,setRL]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const dbRef=useRef(null);
  const useCloud=useRef(false);

  /* ── firebase sync ── */
  const startSync=useCallback(()=>{
    const db=getDb();
    if(!db){useCloud.current=false;return;}
    useCloud.current=true;
    const ref=db.ref("trips");
    dbRef.current=ref;
    setSyncing(true);
    ref.on("value",snap=>{
      const val=snap.val();
      setTrips(val?Object.values(val):[]);
      setSyncing(false);
    });
  },[]);

  /* ── init ── */
  useEffect(()=>{
    const saved=localStorage.getItem("travelsplit_firebase");
    if(saved){
      try{
        const cfg=JSON.parse(saved);
        const ok=initFirebase(cfg);
        if(ok){startSync();setScreen("list");return;}
      }catch{}
    }
    // no cloud config – use local
    try{
      const local=localStorage.getItem("travelsplit_trips");
      if(local)setTrips(JSON.parse(local));
    }catch{}
    setScreen("list");
  },[]);

  /* ── local fallback save ── */
  useEffect(()=>{
    if(!useCloud.current){
      try{localStorage.setItem("travelsplit_trips",JSON.stringify(trips));}catch{}
    }
  },[trips]);

  /* ── rates ── */
  const fetchRates=useCallback(async()=>{
    setRL(true);
    try{
      const res=await fetch("https://open.er-api.com/v6/latest/JPY");
      const data=await res.json();
      if(data.rates){setRates(data.rates);setRateTime(new Date().toLocaleTimeString("ja-JP"));}
    }catch{
      setRates({USD:0.0067,EUR:0.0062,GBP:0.0053,CNY:0.048,KRW:8.9,TWD:0.22,HKD:0.052,PHP:0.39,THB:0.24,JPY:1});
      setRateTime("オフライン(概算値)");
    }finally{setRL(false);}
  },[]);
  useEffect(()=>{fetchRates();},[]);

  const tojpy=(amt,cur)=>cur==="JPY"?amt:rates[cur]?amt/rates[cur]:amt;

  /* ── trip CRUD ── */
  const createTrip=(trip)=>{
    if(useCloud.current){getDb().ref(`trips/${trip.id}`).set(trip);}
    else setTrips(p=>[...p,trip]);
  };
  const updateTrip=(updated)=>{
    if(useCloud.current){getDb().ref(`trips/${updated.id}`).set(updated);}
    else setTrips(p=>p.map(t=>t.id===updated.id?updated:t));
  };
  const deleteTrip=(id)=>{
    if(useCloud.current){getDb().ref(`trips/${id}`).remove();}
    else setTrips(p=>p.filter(t=>t.id!==id));
    if(selectedId===id){setSelectedId(null);setScreen("list");}
  };

  /* ── meta ── */
  const tripsWithMeta=trips.map(trip=>{
    const exps=trip.expenses||[];
    const total=exps.reduce((s,e)=>s+tojpy(e.amount,e.currency),0);
    const{tx}=calcSettlements(trip.members||[],exps,rates);
    return{...trip,_total:total,_settled:tx.length===0};
  });
  const selectedTrip=tripsWithMeta.find(t=>t.id===selectedId);

  if(screen==="loading") return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <span className="spin" style={{fontSize:32}}>✈️</span>
    </div>
  );

  if(screen==="setup") return(
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1a2a3a,#0f1923)",borderBottom:"2px solid #c8a96e",
        paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>✈️</span>
          <div style={{fontSize:20,fontWeight:"bold",color:"#c8a96e",letterSpacing:2}}>TravelSplit</div>
        </div>
      </div>
      <SetupScreen onDone={()=>{
        const db=getDb();
        if(db){startSync();}
        setScreen("list");
      }}/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",paddingBottom:40}}>
      {/* Header */}
      {!selectedTrip&&(
        <div style={{background:"linear-gradient(135deg,#1a2a3a,#0f1923)",borderBottom:"2px solid #c8a96e",
          position:"sticky",top:0,zIndex:100,paddingTop:"env(safe-area-inset-top,0px)"}}>
          <div style={{maxWidth:480,margin:"0 auto",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:26}}>✈️</span>
              <div>
                <div style={{fontSize:20,fontWeight:"bold",color:"#c8a96e",letterSpacing:2}}>TravelSplit</div>
                <div style={{fontSize:10,color:"#8a9bb0",letterSpacing:3,display:"flex",alignItems:"center",gap:6}}>
                  旅の割り勘アプリ
                  {useCloud.current
                    ?<span style={{color:"#5a9a8a"}}>☁️ クラウド同期中</span>
                    :<button onClick={()=>setScreen("setup")} style={{background:"none",border:"1px solid #3a4a5a",borderRadius:8,color:"#6a7a8a",fontSize:9,padding:"1px 6px",cursor:"pointer",letterSpacing:1}}>
                      クラウド設定
                    </button>
                  }
                </div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                {rateLoading?<div style={{fontSize:10,color:"#8a9bb0"}}>📡 取得中...</div>:
                  <><div style={{fontSize:10,color:"#5a7a5a"}}>🟢 為替取得済み</div><div style={{fontSize:9,color:"#4a6a4a"}}>{rateTime}</div></>}
              </div>
            </div>
          </div>
        </div>
      )}

      {selectedTrip?(
        <TripDetail
          trip={selectedTrip}
          rates={rates} rateTime={rateTime} rateLoading={rateLoading}
          onBack={()=>{setSelectedId(null);setScreen("list");}}
          onUpdate={updateTrip}
          onRefreshRates={fetchRates}
          syncing={syncing}
        />
      ):(
        <div style={{maxWidth:480,margin:"0 auto",padding:"24px 16px"}}>
          <TripList
            trips={tripsWithMeta}
            onSelect={id=>{setSelectedId(id);setScreen("detail");}}
            onCreate={createTrip}
            onDelete={deleteTrip}
            syncing={syncing}
          />
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
